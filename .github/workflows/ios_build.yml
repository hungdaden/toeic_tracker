name: Build iOS IPA

on:
  workflow_dispatch: # Chỉ chạy khi người dùng bấm nút Build thủ công trên GitHub

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create assets directory and .env file
        run: |
          mkdir -p assets
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > assets/.env

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Package IPA (Sideload Ready)
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r MunAI_Tracker.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MunAI_iOS_Build
          path: build/ios/iphoneos/MunAI_Tracker.ipa
